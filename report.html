<!DOCTYPE html>
<html>
<head>
    <title>Report Bug</title>
</head>
<body>

    <h1>Bug Reporting Tool</h1>

    <a href="bugs.html">View All Bugs</a>

    <hr>

    <form>

        <label for="bugid">Bug ID:</label><br>
        <input type="text" id="bugid" name="bugid"><br><br>

        <label for="title">Title:</label><br>
        <input type="text" id="title" name="title"><br><br>

        <label for="description">Description:</label><br>
        <textarea id="description" name="description" rows="5" cols="50"></textarea><br><br>

        <label for="steps">Steps to Reproduce:</label><br>
        <textarea id="steps" name="steps" rows="5" cols="50"></textarea><br><br>

        <label for="expected">Expected Result:</label><br>
        <textarea id="expected" name="expected" rows="5" cols="50"></textarea><br><br>

        <label for="actual">Actual Result:</label><br>
        <textarea id="actual" name="actual" rows="5" cols="50"></textarea><br><br>

        <label for="attachment">Attachment (Image/Video):</label><br>
        <input type="file" id="attachment" name="attachment"><br><br>

        <input type="submit" value="Submit Bug">

    </form>

</body>
</html>
